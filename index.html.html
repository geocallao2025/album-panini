<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Álbum Panini FIFA 2026 - Control de Figuritas</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            margin: 0;
            padding: 15px;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            text-shadow: 2px 2px 0 #2a5298;
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
            padding: 8px;
            background: #f0f2f5;
            border-radius: 50px;
        }
        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.97);
        }
        button.report-btn {
            background: #ff9800;
            color: #1e3c72;
        }
        button.export-json-btn {
            background: #4caf50;
        }
        button.export-txt-btn {
            background: #2196f3;
        }
        button.import-btn {
            background: #9c27b0;
        }
        .stats {
            text-align: center;
            padding: 8px;
            font-weight: bold;
            background: #e8f0fe;
            border-radius: 20px;
            margin: 8px 0;
            font-size: 12px;
        }
        .album-table-wrapper {
            flex: 1;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: white;
            min-height: 0;
        }
        table {
            border-collapse: collapse;
            font-size: 12px;
            min-width: 800px;
        }
        th {
            background: #ffd700;
            color: #1e3c72;
            padding: 8px 4px;
            position: sticky;
            top: 0;
            z-index: 10;
            border: 1px solid #ddd;
        }
        td {
            border: 1px solid #ddd;
            text-align: center;
            padding: 6px 3px;
            background-color: white;
            transition: background 0.2s;
        }
        .country-row td:first-child {
            background: #f8f9fa;
            font-weight: bold;
            text-align: left;
            position: sticky;
            left: 0;
            background-color: #ffd;
            z-index: 5;
        }
        .sticker-cell {
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            touch-action: manipulation;
            min-width: 40px;
        }
        .sticker-cell:active {
            background-color: #ccc;
        }
        .empty {
            background-color: #fafafa;
            color: #aaa;
        }
        .have {
            background-color: #c8e6c9;
            color: #2e7d32;
        }
        .duplicate {
            background-color: #ffecb3;
            color: #e65100;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
            font-size: 11px;
        }
        .legend span {
            display: inline-block;
            width: 25px;
            height: 25px;
            border-radius: 8px;
            margin-right: 5px;
            vertical-align: middle;
        }
        .footer {
            text-align: center;
            font-size: 10px;
            margin-top: 8px;
            color: #666;
        }
        .warning-note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 6px 10px;
            margin: 8px 0;
            border-radius: 8px;
            font-size: 11px;
            color: #856404;
        }
        .status {
            text-align: center;
            padding: 6px;
            font-weight: bold;
            background: #e8f0fe;
            border-radius: 20px;
            margin: 8px 0;
            font-size: 11px;
        }
        
        .album-table-wrapper table th:first-child,
        .album-table-wrapper table td:first-child {
            position: sticky;
            left: 0;
            background-color: #ffd700;
        }
        .album-table-wrapper table td:first-child {
            background-color: #fff3cd;
        }
        
        @media (max-width: 700px) {
            body {
                padding: 8px;
            }
            .container {
                padding: 10px;
            }
            button {
                padding: 8px 12px;
                font-size: 0.7rem;
            }
            td, th {
                padding: 4px 2px;
                font-size: 10px;
            }
            .sticker-cell {
                font-size: 1rem;
                min-width: 30px;
            }
            .country-row td:first-child {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚽ Álbum Panini FIFA 2026 📸</h1>
    
    <div class="toolbar">
        <button id="reportBtn" class="report-btn">📊 Reporte</button>
        <button id="exportTxtBtn" class="export-txt-btn">📄 Exportar TXT (Legible)</button>
        <button id="exportJsonBtn" class="export-json-btn">💾 Exportar JSON (Respaldo)</button>
        <input type="file" id="importFile" accept=".json" style="display:none" />
        <button id="importDataBtn" class="import-btn">📂 Importar Datos</button>
    </div>
    
    <div class="stats" id="globalStats">
        Cargando...
    </div>
    
    <div class="warning-note">
        ⚠️ Datos automáticos. Exporta TXT para ver tu progreso fácilmente | JSON para respaldos<br>
        📊 48 países | 20 c/u | 960 total
    </div>
    
    <div class="status" id="statusMsg">
        💡 Toca casilla: Vacío → Tengo → Repetida
    </div>
    
    <div class="album-table-wrapper" id="albumTableWrapper">
        <div id="albumTableContainer">
            <!-- Tabla se genera acá -->
        </div>
    </div>
    
    <div class="legend">
        <div><span style="background:#fafafa; border:1px solid #ccc;"></span> Vacío</div>
        <div><span style="background:#c8e6c9;"></span> ✅ Tengo</div>
        <div><span style="background:#ffecb3;"></span> 🔁 Repetida</div>
    </div>
    <div class="footer">
        ✅ Scroll horizontal + vertical | 48 países | 12 grupos A-L
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 48 países - Grupos A-L (4 por grupo)
    // --------------------------------------------------------------
    const paisesDataRaw = [
        { nombre: "MEXICO", grupo: "A" },
        { nombre: "SUDAFRICA", grupo: "A" },
        { nombre: "KOREA", grupo: "A" },
        { nombre: "REP. CHECA", grupo: "A" },
        { nombre: "CANADA", grupo: "B" },
        { nombre: "BOSNIA HERZEGOVINA", grupo: "B" },
        { nombre: "QATAR", grupo: "B" },
        { nombre: "SUIZA", grupo: "B" },
        { nombre: "BRASIL", grupo: "C" },
        { nombre: "MARRUECOS", grupo: "C" },
        { nombre: "HAITI", grupo: "C" },
        { nombre: "ESCOCIA", grupo: "C" },
        { nombre: "USA", grupo: "D" },
        { nombre: "PARAGUAY", grupo: "D" },
        { nombre: "AUSTRALIA", grupo: "D" },
        { nombre: "TURQUIA", grupo: "D" },
        { nombre: "GERMANY", grupo: "E" },
        { nombre: "CURACAO", grupo: "E" },
        { nombre: "COSTA DE MARFIL", grupo: "E" },
        { nombre: "ECUADOR", grupo: "E" },
        { nombre: "NETHERLANDS", grupo: "F" },
        { nombre: "JAPON", grupo: "F" },
        { nombre: "SUECIA", grupo: "F" },
        { nombre: "TUNEZ", grupo: "F" },
        { nombre: "BELGICA", grupo: "G" },
        { nombre: "EGIPTO", grupo: "G" },
        { nombre: "IRAN", grupo: "G" },
        { nombre: "NUEVA ZELANDA", grupo: "G" },
        { nombre: "SPAIN", grupo: "H" },
        { nombre: "CABO VERDE", grupo: "H" },
        { nombre: "ARABIA SAUDI", grupo: "H" },
        { nombre: "URUGUAY", grupo: "H" },
        { nombre: "FRANCIA", grupo: "I" },
        { nombre: "SENEGAL", grupo: "I" },
        { nombre: "IRAQ", grupo: "I" },
        { nombre: "NORUEGA", grupo: "I" },
        { nombre: "ARGENTINA", grupo: "J" },
        { nombre: "ALGERIA", grupo: "J" },
        { nombre: "AUSTRIA", grupo: "J" },
        { nombre: "JORDANIA", grupo: "J" },
        { nombre: "PORTUGAL", grupo: "K" },
        { nombre: "CONGO", grupo: "K" },
        { nombre: "UZBEKISTAN", grupo: "K" },
        { nombre: "COLOMBIA", grupo: "K" },
        { nombre: "ENGLAND", grupo: "L" },
        { nombre: "CROACIA", grupo: "L" },
        { nombre: "GHANA", grupo: "L" },
        { nombre: "PANAMA", grupo: "L" }
    ];

    let stickersState = {};

    function initEmptyStates() {
        for (let pais of paisesDataRaw) {
            stickersState[pais.nombre] = Array(20).fill(0);
        }
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem("panini2026_data_v2");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                let valid = true;
                for (let pais of paisesDataRaw) {
                    if (!parsed[pais.nombre] || !Array.isArray(parsed[pais.nombre]) || parsed[pais.nombre].length !== 20) {
                        valid = false;
                        break;
                    }
                }
                if (valid) {
                    stickersState = parsed;
                } else {
                    initEmptyStates();
                }
            } catch(e) { 
                initEmptyStates();
            }
        } else {
            initEmptyStates();
        }
        updateGlobalStats();
    }

    function saveToLocalStorage() {
        localStorage.setItem("panini2026_data_v2", JSON.stringify(stickersState));
        updateGlobalStats();
    }
    
    function updateGlobalStats() {
        let totalTenidas = 0;
        let totalRepetidas = 0;
        let totalFaltantes = 0;
        
        for (let pais of paisesDataRaw) {
            const stickers = stickersState[pais.nombre];
            totalTenidas += stickers.filter(v => v === 1).length;
            totalRepetidas += stickers.filter(v => v === 2).length;
            totalFaltantes += stickers.filter(v => v === 0).length;
        }
        
        const statsDiv = document.getElementById("globalStats");
        if (statsDiv) {
            statsDiv.innerHTML = `📊 ✅ ${totalTenidas} tengo | 🔁 ${totalRepetidas} repetidas | ⬜ ${totalFaltantes} faltan | 🎯 Total: ${totalTenidas + totalRepetidas + totalFaltantes}`;
        }
    }

    // NUEVA FUNCIÓN: Exportar a TXT legible (formato por filas)
    function exportToTxt() {
        let txtContent = "========================================\n";
        txtContent += "ÁLBUM PANINI FIFA WORLD CUP 2026\n";
        txtContent += `Fecha: ${new Date().toLocaleString()}\n`;
        txtContent += `Total países: ${paisesDataRaw.length}\n`;
        txtContent += `Figuritas por país: 20\n`;
        txtContent += `Total figuritas: ${paisesDataRaw.length * 20}\n`;
        txtContent += "========================================\n\n";
        txtContent += "LEYENDA:\n";
        txtContent += "  [ ] = Vacío (falta)\n";
        txtContent += "  [T] = Tengo\n";
        txtContent += "  [R] = Repetida\n\n";
        txtContent += "========================================\n";
        txtContent += "LISTADO DE FIGURITAS POR PAÍS\n";
        txtContent += "========================================\n\n";
        
        let totalTenidasGlobal = 0;
        let totalRepetidasGlobal = 0;
        
        for (let pais of paisesDataRaw) {
            const stickers = stickersState[pais.nombre];
            const tenidas = stickers.filter(v => v === 1).length;
            const repetidas = stickers.filter(v => v === 2).length;
            const faltantes = stickers.filter(v => v === 0).length;
            
            totalTenidasGlobal += tenidas;
            totalRepetidasGlobal += repetidas;
            
            txtContent += `📌 ${pais.nombre} (Grupo ${pais.grupo})\n`;
            txtContent += `   Tenidas: ${tenidas} | Repetidas: ${repetidas} | Faltantes: ${faltantes}\n`;
            
            // Mostrar las figuritas en grupos de 10 para mejor legibilidad
            let linea1 = "   Números: ";
            let linea2 = "   Estado:  ";
            
            for (let i = 0; i < stickers.length; i++) {
                const num = i + 1;
                linea1 += `${num.toString().padStart(2, ' ')} `;
                
                if (stickers[i] === 1) linea2 += " T  ";
                else if (stickers[i] === 2) linea2 += " R  ";
                else linea2 += " .  ";
                
                // Salto de línea cada 10 números
                if ((i + 1) % 10 === 0 && i < 19) {
                    linea1 += "\n          ";
                    linea2 += "\n          ";
                }
            }
            
            txtContent += linea1 + "\n";
            txtContent += linea2 + "\n";
            txtContent += "   ( . = Vacío | T = Tengo | R = Repetida )\n";
            txtContent += "\n";
        }
        
        txtContent += "========================================\n";
        txtContent += "RESUMEN GLOBAL\n";
        txtContent += "========================================\n";
        txtContent += `✅ Total figuritas que TIENES: ${totalTenidasGlobal}\n`;
        txtContent += `🔁 Total figuritas REPETIDAS: ${totalRepetidasGlobal}\n`;
        txtContent += `⬜ Total figuritas FALTANTES: ${(paisesDataRaw.length * 20) - totalTenidasGlobal - totalRepetidasGlobal}\n`;
        txtContent += `📊 Avance: ${Math.round((totalTenidasGlobal / (paisesDataRaw.length * 20)) * 100)}%\n`;
        txtContent += "========================================\n";
        txtContent += "Exportado desde Álbum Panini FIFA 2026\n";
        
        // Descargar archivo TXT
        const blob = new Blob([txtContent], {type: "text/plain;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `panini2026_resumen_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert("✅ Archivo TXT exportado correctamente.\n\nÁbrelo con cualquier editor de texto (Bloc de notas, Word, etc.)");
    }

    // Exportar JSON (para respaldo y compartir entre usuarios)
    function exportToJson() {
        const exportData = {};
        
        for (let pais of paisesDataRaw) {
            const stickers = stickersState[pais.nombre];
            const paisData = {};
            
            for (let i = 0; i < stickers.length; i++) {
                const numeroCasilla = i + 1;
                let estadoTexto = stickers[i] === 0 ? "Vacío" : (stickers[i] === 1 ? "Tengo" : "Repetida");
                paisData[`Nro.${numeroCasilla}`] = {
                    codigo: stickers[i],
                    estado: estadoTexto
                };
            }
            
            exportData[pais.nombre] = {
                grupo: pais.grupo,
                figuritas: paisData,
                resumen: {
                    total_tenidas: stickers.filter(v => v === 1).length,
                    total_repetidas: stickers.filter(v => v === 2).length,
                    total_faltantes: stickers.filter(v => v === 0).length
                }
            };
        }
        
        const exportCompleto = {
            metadata: {
                fecha_exportacion: new Date().toLocaleString(),
                album: "Panini FIFA World Cup 2026",
                total_paises: paisesDataRaw.length,
                total_figuritas_posibles: paisesDataRaw.length * 20,
            },
            datos: exportData
        };
        
        const dataStr = JSON.stringify(exportCompleto, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `panini2026_respaldo_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert(`✅ JSON exportado correctamente (para respaldos y compartir entre usuarios)`);
    }
    
    function importData(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                let newState = {};
                
                if (imported.datos && imported.metadata) {
                    for (let pais of paisesDataRaw) {
                        const paisData = imported.datos[pais.nombre];
                        if (paisData && paisData.figuritas) {
                            const stickersArray = [];
                            for (let i = 1; i <= 20; i++) {
                                const casilla = paisData.figuritas[`Nro.${i}`];
                                stickersArray.push(casilla?.codigo || 0);
                            }
                            newState[pais.nombre] = stickersArray;
                        } else {
                            newState[pais.nombre] = Array(20).fill(0);
                        }
                    }
                } else {
                    for (let pais of paisesDataRaw) {
                        if (imported[pais.nombre] && Array.isArray(imported[pais.nombre]) && imported[pais.nombre].length === 20) {
                            newState[pais.nombre] = imported[pais.nombre];
                        } else {
                            newState[pais.nombre] = Array(20).fill(0);
                        }
                    }
                }
                
                stickersState = newState;
                saveToLocalStorage();
                renderAlbum();
                alert("✅ Datos importados correctamente");
                document.getElementById("statusMsg").textContent = "📥 Datos cargados exitosamente";
                setTimeout(() => {
                    document.getElementById("statusMsg").textContent = "💡 Toca casilla: Vacío → Tengo → Repetida";
                }, 2000);
            } catch(err) {
                alert("❌ Archivo inválido. Usa un JSON exportado desde esta aplicación.");
            }
        };
        reader.readAsText(file);
    }

    function renderAlbum() {
        const container = document.getElementById("albumTableContainer");
        if (!container) return;
        
        let html = '<table>';
        html += '<thead>';
        html += '<tr>';
        html += '<th>País / Grupo</th>';
        for (let i = 1; i <= 20; i++) {
            html += `<th>${i}</th>`;
        }
        html += '</tr>';
        html += '</thead>';
        html += '<tbody>';
        
        for (let pais of paisesDataRaw) {
            html += `<tr class="country-row" data-pais="${pais.nombre}">`;
            html += `<td style="font-weight:bold;">${pais.nombre} (${pais.grupo})</td>`;
            const stickers = stickersState[pais.nombre];
            for (let num = 0; num < 20; num++) {
                const estado = stickers[num];
                let clase = "empty";
                let simbolo = "◻️";
                if (estado === 1) {
                    clase = "have";
                    simbolo = "✅";
                } else if (estado === 2) {
                    clase = "duplicate";
                    simbolo = "🔁";
                }
                html += `<td class="sticker-cell ${clase}" data-pais="${pais.nombre}" data-numero="${num+1}">${simbolo}</td>`;
            }
            html += '</tr>';
        }
        html += '</tbody>';
        html += '</table>';
        container.innerHTML = html;
        attachCellEvents();
    }
    
    function nextState(currentState) {
        if (currentState === 0) return 1;
        if (currentState === 1) return 2;
        return 0;
    }
    
    function attachCellEvents() {
        const cells = document.querySelectorAll('.sticker-cell');
        cells.forEach(cell => {
            cell.removeEventListener('click', cellClickHandler);
            cell.addEventListener('click', cellClickHandler);
        });
    }
    
    function cellClickHandler(e) {
        const cell = e.currentTarget;
        const pais = cell.getAttribute('data-pais');
        const numero = parseInt(cell.getAttribute('data-numero'));
        if (!pais || isNaN(numero)) return;
        
        const currentEstado = stickersState[pais][numero-1];
        const newEstado = nextState(currentEstado);
        stickersState[pais][numero-1] = newEstado;
        
        let simbolo = "";
        let clase = "";
        if (newEstado === 1) {
            simbolo = "✅";
            clase = "have";
        } else if (newEstado === 2) {
            simbolo = "🔁";
            clase = "duplicate";
        } else {
            simbolo = "◻️";
            clase = "empty";
        }
        cell.textContent = simbolo;
        cell.className = `sticker-cell ${clase}`;
        
        saveToLocalStorage();
        
        const msgDiv = document.getElementById("statusMsg");
        if (msgDiv) {
            let texto = "";
            if (newEstado === 1) texto = `✅ ${pais} - N°${numero}: Tengo`;
            else if (newEstado === 2) texto = `🔁 ${pais} - N°${numero}: Repetida`;
            else texto = `⬜ ${pais} - N°${numero}: Vacío`;
            msgDiv.textContent = texto;
            setTimeout(() => {
                if (document.getElementById("statusMsg") && document.getElementById("statusMsg").textContent === texto) {
                    document.getElementById("statusMsg").textContent = "💡 Toca casilla: Vacío → Tengo → Repetida";
                }
            }, 1500);
        }
    }
    
    function generateReport() {
        let report = "📋 REPORTE DE FIGURITAS REPETIDAS\n";
        report += "=====================================\n\n";
        let totalRepe = 0;
        let hasAny = false;
        let reportDetails = [];
        
        for (let pais of paisesDataRaw) {
            const stickers = stickersState[pais.nombre];
            const repetidos = [];
            for (let i = 0; i < 20; i++) {
                if (stickers[i] === 2) repetidos.push(i+1);
            }
            if (repetidos.length > 0) {
                hasAny = true;
                totalRepe += repetidos.length;
                reportDetails.push(`🏷️ ${pais.nombre} (${pais.grupo}): ${repetidos.length} repe - N°: ${repetidos.join(", ")}`);
            }
        }
        
        if (!hasAny) {
            report += "✨ ¡No hay repetidas! ✨";
        } else {
            report += reportDetails.join("\n\n");
            report += `\n\n📊 TOTAL REPETIDAS: ${totalRepe}`;
        }
        alert(report);
    }
    
    // Inicialización
    document.addEventListener("DOMContentLoaded", () => {
        loadFromLocalStorage();
        renderAlbum();
        
        document.getElementById("reportBtn").addEventListener("click", generateReport);
        document.getElementById("exportTxtBtn").addEventListener("click", exportToTxt);
        document.getElementById("exportJsonBtn").addEventListener("click", exportToJson);
        
        const importFileInput = document.getElementById("importFile");
        document.getElementById("importDataBtn").addEventListener("click", () => {
            importFileInput.click();
        });
        importFileInput.addEventListener("change", (e) => {
            if (e.target.files.length > 0) {
                importData(e.target.files[0]);
                importFileInput.value = '';
            }
        });
    });
</script>
</body>
</html>
